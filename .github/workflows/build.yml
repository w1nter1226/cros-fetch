name: Compile Win exe

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # manual for right now since i want to make sure this works

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: setup python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: install deps
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: build the exe
      run: |
        pyinstaller --onefile --name "cros-fetch" main.py

    - name: upload exe artifact
      uses: actions/upload-artifact@v4
      with:
        name: cros-fetch-windows-exe
        path: dist/cros-fetch.exe
